<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1e3a5f" />
    <meta name="description" content="Hadicha Wear zavod boshqaruv tizimi" />
    <!-- Android PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Hadicha Wear" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <!-- Icons -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="icon" type="image/x-icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <title>Hadicha Wear</title>
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        -webkit-font-smoothing: antialiased;
        overscroll-behavior-y: contain;
        overscroll-behavior-x: none;
      }
      #root { height: 100%; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes slideInRight {
        from { transform: translateX(100px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes slideUp {
        from { transform: translateY(100%); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #f1f5f9; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
      input::placeholder, textarea::placeholder { color: #94a3b8; opacity: 1; }
      input, select, textarea, button { -webkit-tap-highlight-color: transparent; }
      @media (max-width: 768px) {
        input, select, textarea { font-size: 16px !important; }
      }
    </style>
  </head>
  <body>
    <noscript>JavaScript yoqilishi kerak.</noscript>
    <div id="root"></div>
  </body>
</html>
