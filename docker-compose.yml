version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: factory_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:password@db/factory_db
      SECRET_KEY: change-this-secret-key-in-production
    depends_on:
      - db
    volumes:
      - ./backend:/app

  frontend:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm start"
    environment:
      REACT_APP_API_URL: http://localhost:8000

volumes:
  pgdata:
